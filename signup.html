<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modern Signup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="auth-card">
      <div class="brand-panel">
        <span class="brand-badge">Create</span>
        <h1>Sign up for an account</h1>
        <p>Join today and start building your future with elegant tools and secure onboarding.</p>
      </div>

      <form id="signupForm" class="signup-form" novalidate>
        <div class="field-grid">
          <label class="field-group">
            <span>Full Name</span>
            <input type="text" name="name" placeholder="Alex Johnson" required />
          </label>

          <label class="field-group">
            <span>Email</span>
            <input type="email" name="email" placeholder="alex@example.com" required />
          </label>
        </div>

        <label class="field-group">
          <span>Password</span>
          <input type="password" name="password" placeholder="Enter a strong password" required minlength="8" />
        </label>

        <label class="field-group checkbox-group">
          <input type="checkbox" name="terms" required />
          <span>I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</span>
        </label>

        <button type="submit" class="primary-button">Create account</button>

        <p class="inline-note">
          Already have an account? <a href="#">Log in</a>
        </p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
